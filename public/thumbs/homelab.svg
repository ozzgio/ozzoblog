<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Server box body -->
  <rect x="230" y="90" width="340" height="220" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <!-- Top bezel -->
  <rect x="230" y="90" width="340" height="32" rx="14" fill="#263346"/>
  <rect x="230" y="108" width="340" height="14" fill="#263346"/>

  <!-- Drive bays -->
  <rect x="258" y="140" width="284" height="26" rx="5" fill="#0f172a" stroke="#2d3f55" stroke-width="1"/>
  <rect x="258" y="176" width="284" height="26" rx="5" fill="#0f172a" stroke="#2d3f55" stroke-width="1"/>
  <rect x="258" y="212" width="284" height="26" rx="5" fill="#0f172a" stroke="#2d3f55" stroke-width="1"/>

  <!-- Bay labels -->
  <text x="280" y="158" font-family="Verdana, monospace" font-size="11" fill="#475569">hermes-gateway</text>
  <text x="280" y="194" font-family="Verdana, monospace" font-size="11" fill="#475569">synergym-prod</text>
  <text x="280" y="230" font-family="Verdana, monospace" font-size="11" fill="#475569">obsidian-vault</text>

  <!-- Bottom row: LEDs + ports -->
  <circle cx="268" cy="272" r="7" fill="#22c55e"/>
  <circle cx="290" cy="272" r="7" fill="#22c55e" opacity="0.55"/>
  <circle cx="312" cy="272" r="7" fill="#3b82f6" opacity="0.8"/>

  <rect x="440" y="263" width="48" height="16" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <rect x="498" y="263" width="48" height="16" rx="3" fill="#0f172a" stroke="#475569" stroke-width="1"/>

  <!-- Footer label -->
  <text x="400" y="370" text-anchor="middle" font-family="Verdana, sans-serif" font-size="22" fill="#475569" font-weight="bold" letter-spacing="5">NUC HOMELAB</text>
  <text x="400" y="400" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" fill="#334155">25+ services · self-hosted · Intel NUC14</text>
</svg>
